<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="loading" style="text-align: center; padding: 50px; font-size: 20px;">
        Now Loading
    </div>

    <div id="app-content" class="app-container" style="display: none;">
        <div id="form-area" class="form-wrapper"></div>
        <div class="game-container">
            <img src="assets/images/750x750.png" class="background" id="main-background" alt="クリア画像" />

            <div class="save-guard"></div>

            <div class="tiles"></div>
        </div>
        <div id="final-form-container"></div>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content confirm-modal-content">
            <p id="confirm-modal-text"></p>
            <div class="confirm-modal-buttons">
                <button id="confirm-cancel" class="cancel-button">やめる</button>
                <button id="confirm-ok" class="ok-button">開く</button>
            </div>
        </div>
    </div>

    <div id="hint-modal" class="modal-overlay hidden">
        <div class="modal-content hint-modal-content">
            <h3 id="hint-modal-title">ヒント</h3>
            <p id="hint-modal-text"></p>

            <img id="explanation-modal-image" src="" alt="解説画像"
                style="max-width: 100%; display: none; margin-top: 15px; border-radius: 8px;">

            <button id="hint-modal-close" class="close-button">閉じる</button>
        </div>

        <script type="module" src="main.js"></script>

</body>

</html>
